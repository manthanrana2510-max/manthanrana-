<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page with Footer</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark d-flex flex-column min-vh-100">

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">MyWebsite</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#about">About</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="container flex-grow-1 py-5">

    <section id="home" class="text-center mb-5">
        <h1 class="text-primary">Welcome</h1>
        <p class="text-secondary">
            This landing page uses a consistent Bootstrap color scheme.
        </p>
    </section>

    <section id="about" class="mb-5">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h3 class="text-primary">About Us</h3>
                <p class="text-muted">
                    We create modern, responsive web experiences using Bootstrap.
                </p>
            </div>
        </div>
    </section>

    <section id="contact">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h3 class="text-primary">Contact</h3>
                <p class="text-muted">
                    Email: info@example.com<br>
                    Phone: +91 98765 43210
                </p>
            </div>
        </div>
    </section>

</main>

<!-- Footer -->
<footer class="bg-primary text-white text-center py-4 mt-auto">
    <div class="container">

        <h5 class="mb-3">Follow Us</h5>

        <!-- Social Icons -->
        <a href="#" class="text-white fs-3 me-3">
            <i class="bi bi-instagram"></i>
        </a>

        <a href="#" class="text-white fs-3 me-3">
            <i class="bi bi-facebook"></i>
        </a>

        <a href="#" class="text-white fs-3 me-3">
            <i class="bi bi-twitter-x"></i>
        </a>

        <a href="#" class="text-white fs-3">
            <i class="bi bi-youtube"></i>
        </a>

        <p class="mt-3 mb-0">
            &copy; 2026 MyWebsite. All Rights Reserved.
        </p>

    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
