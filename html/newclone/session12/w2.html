<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Featured Playlists</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">

<div class="container py-5">
    <h2 class="text-center text-white mb-4">🎵 Featured Playlists</h2>

    <div class="row g-4">

        <!-- Playlist 1 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow">
                <img src="https://via.placeholder.com/300x300?text=Playlist+1"
                     class="card-img-top"
                     alt="Chill Vibes">

                <div class="card-body text-center">
                    <h5 class="card-title">Chill Vibes</h5>
                    <p class="card-text text-muted">
                        Relax with soothing beats and calm melodies.
                    </p>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

        <!-- Playlist 2 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow">
                <img src="https://via.placeholder.com/300x300?text=Playlist+2"
                     class="card-img-top"
                     alt="Top Hits">

                <div class="card-body text-center">
                    <h5 class="card-title">Top Hits</h5>
                    <p class="card-text text-muted">
                        Enjoy today's biggest chart-topping songs.
                    </p>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

        <!-- Playlist 3 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow">
                <img src="https://via.placeholder.com/300x300?text=Playlist+3"
                     class="card-img-top"
                     alt="Workout Mix">

                <div class="card-body text-center">
                    <h5 class="card-title">Workout Mix</h5>
                    <p class="card-text text-muted">
                        High-energy tracks to power your workout.
                    </p>
                    <a href="#" class="btn btn-success">Listen Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
