<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page with Sticky Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        section {
            padding: 80px 0;
        }

        #home {
            background: #f8f9fa;
        }

        #about {
            background: #e9ecef;
        }

        #contact {
            background: #dee2e6;
        }
    </style>
</head>
<body>

<!-- Sticky Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="#">MyWebsite</a>

        <!-- Hamburger Menu -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#home">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#about">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#contact">Contact</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<!-- Home Section -->
<section id="home">
    <div class="container text-center">
        <h1>Welcome to My Landing Page</h1>
        <p class="lead">
            This is the Home section with a sticky Bootstrap navigation bar.
        </p>
    </div>
</section>

<!-- About Section -->
<section id="about">
    <div class="container text-center">
        <h2>About</h2>
        <p>
            Learn more about our services, mission, and values in this section.
        </p>
    </div>
</section>

<!-- Contact Section -->
<section id="contact">
    <div class="container text-center">
        <h2>Contact</h2>
        <p>
            Get in touch with us via email, phone, or social media.
        </p>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
