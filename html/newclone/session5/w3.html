<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Button</title>
    <style>
        /* Style all button elements */

button {
    background-color: #e23744; /* Zomato-inspired red */
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

/* Hover Effect */
button:hover {
    background-color: #c62839;
}
    </style>

    <!-- Linking External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Food Delivery</h2>

    <button>Order Now</button>
    <button>Add to Cart</button>
    <button>View Menu</button>

</body>
</html>
