<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Detail</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #222;
            margin: 0;
            padding: 0;
            transition: background-color 0.4s, color 0.4s;
        }

        header {
            background-color: #d32f2f;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: background-color 0.4s;
        }

        button {
            padding: 10px 20px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #b71c1c;
        }

        /* Dark Mode */
        .dark-mode {
            background-color: #121212;
            color: white;
        }

        .dark-mode .container {
            background-color: #1e1e1e;
        }

        .dark-mode header {
            background-color: #000;
        }

        .dark-mode button {
            background-color: #444;
        }

        .dark-mode button:hover {
            background-color: #666;
        }
    </style>
</head>

<body>

    <header>
        <h1>BookMyShow</h1>
    </header>

    <div class="container">
        <button onclick="toggleMode()">🌙 Toggle Light/Dark Mode</button>

        <h2>Avengers: Endgame</h2>

        <p><strong>Genre:</strong> Action, Adventure, Sci-Fi</p>

        <p><strong>Duration:</strong> 3h 2m</p>

        <p><strong>Rating:</strong> ★★★★☆ (4.8/5)</p>

        <p>
            After the devastating events of Infinity War, the Avengers
            assemble once more to reverse Thanos' actions and restore
            balance to the universe.
        </p>
    </div>

    <script>
        function toggleMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
