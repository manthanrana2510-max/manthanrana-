<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist</title>
    <style>
     
.playlist-item {
    background-color: #121212; 
    color: white;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
}


#currently-playing {
    background-color: #1DB954; /* Spotify green */
    color: black;
    font-weight: bold;
}
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="playlist-item">Shape of You</div>
    <div class="playlist-item" id="currently-playing">Blinding Lights 🎵</div>
    <div class="playlist-item">Levitating</div>
    <div class="playlist-item">Perfect</div>

</body>
</html>
