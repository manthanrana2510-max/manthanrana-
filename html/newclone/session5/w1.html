<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card</title>
</head>
<body>

    <div style="width:300px; border:1px solid #ccc; padding:15px; border-radius:10px; font-family:Arial, sans-serif;">

        <img src="images/download.webp" alt="Product Image" width="250">

        <!-- Product Title with Inline CSS -->
        <h2 style="background-color: lightblue; font-size: 28px; padding:8px;">
            Samsung Galaxy S25
        </h2>

        <p><strong>Price:</strong> ₹74,999</p>
        <p>Latest smartphone with AI features, 256GB storage, and 12GB RAM.</p>

        <button>Buy Now</button>

    </div>

</body>
</html>
