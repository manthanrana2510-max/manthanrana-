<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Cards</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row g-4">

        <!-- Product Card 1 -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product 1">
                <div class="card-body text-center">
                    <h5 class="card-title">Wireless Headphones</h5>
                    <p class="card-text text-success fw-bold">₹1,999</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

        <!-- Product Card 2 -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <img src= class="card-img-top" alt="Product 2">
                <div class="card-body text-center">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text text-success fw-bold">₹2,499</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

        <!-- Product Card 3 -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Product 3">
                <div class="card-body text-center">
                    <h5 class="card-title">Bluetooth Speaker</h5>
                    <p class="card-text text-success fw-bold">₹1,499</p>
                    <a href="#" class="btn btn-primary">Buy Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
