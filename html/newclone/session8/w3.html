<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="row align-items-center">

        <!-- Movie Poster -->
        <div class="col-md-4 text-center">
            <img src="images/images.png"
                 alt="Movie Poster"
                 class="img-fluid rounded shadow">
        </div>

        <!-- Movie Details -->
        <div class="col-md-8">
            <h2 class="fw-bold">Avengers: Endgame</h2>
            <p><strong>Genre:</strong> Action | Adventure | Sci-Fi</p>
            <p><strong>Rating:</strong> ⭐ 8.9/10</p>
            <p>
                The Avengers assemble one final time to reverse the actions of Thanos
                and restore balance to the universe in this epic Marvel adventure.
            </p>

            <button class="btn btn-danger btn-lg">
                Book Now
            </button>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
