<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive 2-Column Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
    <div class="row g-4">

        <!-- Column 1 -->
        <div class="col-12 col-md-6">
            <div class="p-4 bg-primary text-white rounded text-center">
                <h3>Column 1</h3>
                <p>This column takes full width on mobile and half width on medium screens and larger.</p>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="col-12 col-md-6">
            <div class="p-4 bg-success text-white rounded text-center">
                <h3>Column 2</h3>
                <p>This column also stacks on mobile and sits beside Column 1 on larger screens.</p>
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
