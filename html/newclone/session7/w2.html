<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Bar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 40px;
        }

        .playlist-bar {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .song-card {
            background-color: #682f2f;
            color: white;
            width: 180px;
            height: 80px;
            border-radius: 10px;
            display: flex;
            align-items: center; /* Vertically centers the text */
            justify-content: center;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .song-info h3 {
            margin: 0;
            font-size: 18px;
        }

        .song-info p {
            margin: 5px 0 0;
            font-size: 14px;
        }
    
        .song-card:hover{
              transform: scale(1.1);
        }

        
    </style>
</head>
<body>

    <div class="playlist-bar">

        <div class="song-card">
            <div class="song-info">
                <h3>Blinding Lights</h3>
                <p>The Weeknd</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h3>Perfect</h3>
                <p>Ed Sheeran</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h3>Shape of You</h3>
                <p>Ed Sheeran</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h3>Levitating</h3>
                <p>Dua Lipa</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h3>Stay</h3>
                <p>The Kid LAROI & Justin Bieber</p>
            </div>
        </div>

    </div>

</body>
</html>
