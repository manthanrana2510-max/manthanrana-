    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart Style Product Grid</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f1f3f6;
      padding: 30px;
    }

    .product-section {
      max-width: 1000px;
      margin: auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .product-card {
      background: #fff;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 5px;
    }

    .product-card h3 {
      margin-top: 12px;
      font-size: 18px;
      color: #333;
    }
    .product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* Desktop: 3 columns */
  gap: 20px;
}

/* Tablet: 2 columns */
@media (max-width: 768px) {
  .product-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* Mobile: 1 column */
@media (max-width: 480px) {
  .product-grid {
    grid-template-columns: 1fr;
  }
}
  </style>
</head>

<body>

  <section class="product-section">
    <div class="product-grid">

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 1">
        <h3>Wireless Headphones</h3>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 2">
        <h3>Smart Watch</h3>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 3">
        <h3>Bluetooth Speaker</h3>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 4">
        <h3>Laptop Backpack</h3>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 5">
        <h3>Gaming Mouse</h3>
      </div>

      <div class="product-card">
        <img src="https://via.placeholder.com/250x180" alt="Product 6">
        <h3>Mobile Phone</h3>
      </div>

    </div>
  </section>

</body>
</html>
</body>
