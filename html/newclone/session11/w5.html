<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Theme Switcher</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">

<div class="container py-5" id="mainContainer">

    <div class="text-center">
        <h2 class="mb-4">🎬 Movie Booking</h2>
        <p class="mb-4">
            Click the button below to switch between Light and Dark themes.
        </p>

        <!-- Theme Switcher Button -->
        <button id="themeBtn" class="btn btn-primary">
            🌙 Switch to Dark Mode
        </button>
    </div>

    <!-- Sample Card -->
    <div class="card mt-5 shadow">
        <div class="card-body">
            <h4 class="card-title">Avengers: Endgame</h4>
            <p class="card-text">
                Rating: ⭐ 8.9/10 <br>
                Genre: Action | Adventure | Sci-Fi
            </p>
            <button class="btn btn-success">Book Ticket</button>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const body = document.body;
    const button = document.getElementById("themeBtn");

    button.addEventListener("click", function () {

        // Toggle background classes
        body.classList.toggle("bg-light");
        body.classList.toggle("bg-dark");

        // Toggle text color classes
        body.classList.toggle("text-dark");
        body.classList.toggle("text-light");

        // Update button text
        if (body.classList.contains("bg-dark")) {
            button.textContent = "☀️ Switch to Light Mode";
        } else {
            button.textContent = "🌙 Switch to Dark Mode";
        }
    });
</script>

</body>
</html>
