<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Review Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card mx-auto shadow" style="max-width: 500px;">

        <!-- Movie Poster -->
        <img src="https://via.placeholder.com/500x300"
             class="card-img-top"
             alt="Movie Poster">

        <!-- Card Body -->
        <div class="card-body">

            <!-- Movie Title -->
            <h2 class="fw-bold display-6">
                Avengers: Endgame
            </h2>

            <!-- Rating -->
            <p class="fs-4 fw-semibold text-warning mb-2">
                ⭐ 8.9/10
            </p>

            <!-- Genre -->
            <p class="text-muted small">
                Action | Adventure | Sci-Fi
            </p>

            <!-- Review -->
            <p class="fs-6 fw-normal">
                An epic conclusion to the Infinity Saga with stunning visual effects,
                emotional storytelling, and unforgettable performances. A must-watch
                for every Marvel fan!
            </p>

            <!-- Button -->
            <a href="#" class="btn btn-danger">
                Read More Reviews
            </a>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
