<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Food Order Form</title>
</head>
<body>

    <h2>Zomato Food Order Form</h2>

    <form action="#" method="POST">

        <!-- User Name -->
        <label for="username">User Name:</label><br>
        <input type="text" id="username" name="username" required><br><br>

        <!-- Food Item -->
        <label for="food">Select Food Item:</label><br>
        <select id="food" name="food" required>
            <option value="" selected disabled>-- Select Food Item --</option>
            <option value="Pizza">Pizza</option>
            <option value="Burger">Burger</option>
            <option value="Biryani">Biryani</option>
        </select><br><br>

        <!-- Quantity -->
        <label for="quantity">Quantity:</label><br>
        <input type="number" id="quantity" name="quantity" min="1" required><br><br>

        <!-- Delivery Instructions -->
        <label for="instructions">Delivery Instructions:</label><br>
        <textarea id="instructions" name="instructions" rows="4" cols="40" required></textarea><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Place Order">

    </form>

</body>
</html>
</body>
</html>
