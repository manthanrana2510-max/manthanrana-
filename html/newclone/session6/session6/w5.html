<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Prime Cards</title>

    <style>
        /* Reusable class for common spacing.
           This improves maintainability because if we want to
           change the spacing later, we only need to edit this
           class instead of updating every individual element. */
        .common-space {
            margin: 20px;
            padding: 15px;
        }

        .movie-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #0F171E;
            color: white;
        }

        .movie-title {
            font-size: 20px;
            font-weight: bold;
        }

        .movie-description {
            color: #cccccc;
        }
    </style>
</head>
<body>

    <div class="movie-card common-space">
        <h2 class="movie-title">The Boys</h2>
        <p class="movie-description">
            A superhero action series available on Amazon Prime Video.
        </p>
    </div>

    <div class="movie-card common-space">
        <h2 class="movie-title">Reacher</h2>
        <p class="movie-description">
            An action-packed thriller based on the Jack Reacher novels.
        </p>
    </div>

</body>
</html>
