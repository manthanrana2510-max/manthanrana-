<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chat Notification Badge</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            height: 2000px; /* Extra height to demonstrate scrolling */
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        /* WhatsApp Notification Badge */
        .whatsapp-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .notification-count {
            background-color: red;
            color: white;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 12px;
            margin-left: 8px;
        }

        .whatsapp-badge:hover {
            background-color: #1ebe5d;
        }
    </style>
</head>
<body>

    <h1>Scroll Down to See the Fixed WhatsApp Badge</h1>
    <p>This page contains extra height so you can scroll and verify that the WhatsApp notification badge remains fixed at the bottom-right corner.</p>

    <div class="whatsapp-badge">
        💬 WhatsApp
        <span class="notification-count">3</span>
    </div>

</body>
</html>
