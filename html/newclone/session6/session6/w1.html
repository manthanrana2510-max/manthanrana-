<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant Card</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 30px;
        }

        .restaurant-card {
            width: 320px;
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
        }

        .section {
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 5px;
        }

        .restaurant-name {
            font-size: 24px;
            font-weight: bold;
            color: #e23744;
        }

        .cuisine {
            font-size: 18px;
            color: #555;
        }

        .rating {
            font-size: 18px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="restaurant-card">

        <div class="section restaurant-name">
            Spice Garden
        </div>

        <div class="section cuisine">
            Cuisine: North Indian, Chinese
        </div>

        <div class="section rating">
            ⭐ Rating: 4.5/5
        </div>

    </div>

</body>
</html>
